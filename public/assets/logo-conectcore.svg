<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" fill="none">
    <defs>
        <!-- Gradient for lines and nodes: cyan → indigo → magenta -->
        <linearGradient id="meshGrad" x1="55" y1="5" x2="55" y2="135" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22D3EE" />
            <stop offset="35%" stop-color="#60A5FA" />
            <stop offset="55%" stop-color="#6366F1" />
            <stop offset="75%" stop-color="#A855F7" />
            <stop offset="100%" stop-color="#C026D3" />
        </linearGradient>
        <!-- Slightly transparent for lines -->
        <linearGradient id="lineGrad" x1="55" y1="5" x2="55" y2="135" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.7" />
            <stop offset="35%" stop-color="#60A5FA" stop-opacity="0.7" />
            <stop offset="55%" stop-color="#6366F1" stop-opacity="0.7" />
            <stop offset="75%" stop-color="#A855F7" stop-opacity="0.7" />
            <stop offset="100%" stop-color="#C026D3" stop-opacity="0.7" />
        </linearGradient>
    </defs>

    <!-- ══ Network Mesh ══ -->
    <g stroke="url(#lineGrad)" stroke-width="1.2">
        <!-- Top cluster (cyan) connections -->
        <line x1="62" y1="8" x2="48" y2="22" />
        <line x1="62" y1="8" x2="78" y2="18" />
        <line x1="48" y1="22" x2="78" y2="18" />
        <line x1="48" y1="22" x2="35" y2="35" />
        <line x1="78" y1="18" x2="92" y2="30" />
        <line x1="78" y1="18" x2="65" y2="36" />
        <line x1="48" y1="22" x2="65" y2="36" />
        <line x1="35" y1="35" x2="50" y2="42" />
        <line x1="35" y1="35" x2="22" y2="50" />
        <line x1="65" y1="36" x2="50" y2="42" />
        <line x1="65" y1="36" x2="80" y2="48" />
        <line x1="92" y1="30" x2="80" y2="48" />
        <line x1="92" y1="30" x2="100" y2="42" />

        <!-- Middle cluster (indigo) connections -->
        <line x1="50" y1="42" x2="22" y2="50" />
        <line x1="50" y1="42" x2="42" y2="58" />
        <line x1="50" y1="42" x2="65" y2="56" />
        <line x1="80" y1="48" x2="65" y2="56" />
        <line x1="80" y1="48" x2="88" y2="62" />
        <line x1="100" y1="42" x2="88" y2="62" />
        <line x1="22" y1="50" x2="14" y2="65" />
        <line x1="22" y1="50" x2="42" y2="58" />
        <line x1="42" y1="58" x2="65" y2="56" />
        <line x1="42" y1="58" x2="30" y2="72" />
        <line x1="42" y1="58" x2="55" y2="74" />
        <line x1="65" y1="56" x2="55" y2="74" />
        <line x1="65" y1="56" x2="78" y2="70" />
        <line x1="88" y1="62" x2="78" y2="70" />
        <line x1="14" y1="65" x2="30" y2="72" />
        <line x1="14" y1="65" x2="20" y2="82" />

        <!-- Lower cluster (purple) connections -->
        <line x1="30" y1="72" x2="20" y2="82" />
        <line x1="30" y1="72" x2="45" y2="85" />
        <line x1="55" y1="74" x2="45" y2="85" />
        <line x1="55" y1="74" x2="68" y2="84" />
        <line x1="78" y1="70" x2="68" y2="84" />
        <line x1="78" y1="70" x2="82" y2="82" />
        <line x1="20" y1="82" x2="28" y2="95" />
        <line x1="20" y1="82" x2="45" y2="85" />
        <line x1="45" y1="85" x2="38" y2="98" />
        <line x1="45" y1="85" x2="58" y2="96" />
        <line x1="68" y1="84" x2="58" y2="96" />
        <line x1="68" y1="84" x2="72" y2="98" />
        <line x1="82" y1="82" x2="72" y2="98" />

        <!-- Bottom cluster (magenta) connections -->
        <line x1="28" y1="95" x2="38" y2="98" />
        <line x1="28" y1="95" x2="35" y2="110" />
        <line x1="38" y1="98" x2="52" y2="108" />
        <line x1="58" y1="96" x2="52" y2="108" />
        <line x1="58" y1="96" x2="65" y2="110" />
        <line x1="72" y1="98" x2="65" y2="110" />
        <line x1="35" y1="110" x2="52" y2="108" />
        <line x1="35" y1="110" x2="42" y2="122" />
        <line x1="52" y1="108" x2="42" y2="122" />
        <line x1="52" y1="108" x2="58" y2="120" />
        <line x1="65" y1="110" x2="58" y2="120" />
        <line x1="42" y1="122" x2="58" y2="120" />
        <line x1="42" y1="122" x2="50" y2="132" />
        <line x1="58" y1="120" x2="50" y2="132" />
    </g>

    <!-- ══ Nodes ══ -->
    <g fill="url(#meshGrad)">
        <!-- Top nodes (cyan area) -->
        <circle cx="62" cy="8" r="5" fill="#22D3EE" />
        <circle cx="48" cy="22" r="4" fill="#22D3EE" />
        <circle cx="78" cy="18" r="5.5" fill="#38BDF8" />
        <circle cx="92" cy="30" r="3.5" fill="#60A5FA" />
        <circle cx="100" cy="42" r="3" fill="#6366F1" />

        <!-- Upper-mid nodes -->
        <circle cx="35" cy="35" r="3.5" fill="#38BDF8" />
        <circle cx="65" cy="36" r="4" fill="#60A5FA" />
        <circle cx="50" cy="42" r="3.5" fill="#60A5FA" />
        <circle cx="80" cy="48" r="4" fill="#6366F1" />

        <!-- Mid nodes (indigo area) -->
        <circle cx="22" cy="50" r="4" fill="#60A5FA" />
        <circle cx="42" cy="58" r="3.5" fill="#6366F1" />
        <circle cx="65" cy="56" r="4.5" fill="#6366F1" />
        <circle cx="88" cy="62" r="3.5" fill="#7C3AED" />
        <circle cx="14" cy="65" r="3" fill="#818CF8" />

        <!-- Lower-mid nodes (purple area) -->
        <circle cx="30" cy="72" r="4" fill="#7C3AED" />
        <circle cx="55" cy="74" r="3.5" fill="#7C3AED" />
        <circle cx="78" cy="70" r="3.5" fill="#8B5CF6" />
        <circle cx="82" cy="82" r="3" fill="#A855F7" />
        <circle cx="20" cy="82" r="4.5" fill="#8B5CF6" />

        <!-- Lower nodes -->
        <circle cx="45" cy="85" r="4" fill="#A855F7" />
        <circle cx="68" cy="84" r="3.5" fill="#A855F7" />
        <circle cx="28" cy="95" r="3.5" fill="#A855F7" />
        <circle cx="38" cy="98" r="3" fill="#C026D3" />
        <circle cx="58" cy="96" r="4" fill="#C026D3" />
        <circle cx="72" cy="98" r="3.5" fill="#C026D3" />

        <!-- Bottom nodes (magenta area) -->
        <circle cx="35" cy="110" r="4" fill="#C026D3" />
        <circle cx="52" cy="108" r="3.5" fill="#D946EF" />
        <circle cx="65" cy="110" r="4.5" fill="#C026D3" />
        <circle cx="42" cy="122" r="3" fill="#D946EF" />
        <circle cx="58" cy="120" r="3.5" fill="#D946EF" />
        <circle cx="50" cy="132" r="4.5" fill="#E879F9" />
    </g>

    <!-- ══ Text: CONECTCORE ══ -->
    <text x="125" y="82" font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif"
        font-size="48" letter-spacing="-0.5">
        <tspan font-weight="600" fill="#1D1D2C">CONECT</tspan>
        <tspan font-weight="400" fill="#3B3B52">CORE</tspan>
    </text>
</svg>